<!DOCTYPE html>
<html lang="en">
    <head>
        <meta chraset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <style>

            *{
                transition: all 0.2s ease;
                box-sizing: border-box;
            }
            body{
                font-family: 'Inter', sans-serif;
                background: linear-gradient(to bottom right, #f8fafc, #e2e8f0);
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                padding: 20px;
                margin:0;
                
            }

            .container{
                background: rgba(255,255,255,0.9);
                backdrop-filter: blur(10px);
                border: 1px solid #e5e7eb;
                padding: 40px 32px; 
                border-radius: 20px;
                width: 440px;
                max-width: 90%;
                box-shadow: 0 10px 30px rgba(0,0,0,0.08);
                text-align: center;
                overflow: hidden;
                
            }

            h1{
                font-size: 32px;
                font-weight: 700;
                margin-bottom: 8px;
                color:#111827;;
            }

            .container h1{
                margin-bottom: 15px;
            }

            .subtitle{
                color: #6b7280;
                font-size: 14px;
                margin-bottom: 25px;
            }

            input{
                padding: 14px;
                border-radius: 10px;
                border: 1px solid #d1d5db;
                outline: none;
                background: white;
                font-size: 14px;
                height: 48px;
                font-size: 15px;
                transition: 0.2s; 
            }

            .input-group{
                display: flex;
                flex-direction: column;
                gap: 12px;
                margin-bottom: 15px;
            }

            .input-group input{
                width: 100%;
                margin-bottom:12px;
            }

            

            input:focus{
                border-color: #2563eb;
                box-shadow: 0 0 4px rgba(37,99,235,0.15);
            }

            

            button{ 
                padding: 10px 16px;
                border: none;
                background: #2563eb;
                color: white;
                border-radius: 12px;
                cursor: pointer;
                font-weight: 500;
                transition: 0.2s;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 6px;  
            }

            button:hover{
                transform: translateY(-2px);
                opacity: 0.95;
                
            }

            .actions{
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
                margin-bottom: 20px;
            }

            li{
                background: #ffffff;
                padding: 14px;
                margin-top: 12px;
                border-radius: 12px;
                color: #111827;
                border: 1px solid #eef2ff;
                box-shadow: 0 2px 8px rgba(0,0,0,0.04);
                justify-content: space-between;
                align-items: center;
                list-style: none;
                
            }

            li:hover{
                transform: translateY(-3px);
                box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            }

            li div button{
                margin-left: 5px;
                padding: 5px 8px;
                font-size: 14px;
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
                margin-bottom: 15px;
            }

            li span{
             font-size:14px;
             line-height:1.5;
            }

            button i{
                font-size: 13px;
            }

            .dark{
                background: #1f2937;
                color: white;
                border: 1px solid #374151;
            }

            .dark .container{
                background: #1e1e1e;
            }

            .dark input{
                background: #333;
                color: white;
                border: 1px solid #555;
            }

            .dark li{
                background: #333;
            }

            .dark button{
                background: #6a0dad;
            }

            .container{
                animation: fadeIn 0.6s ease;
            }

            @keyframes fadeIn{
                from{
                    opacity: 0;
                    transform: scale(0.96);
                }
                to{
                    opacity: 1;
                    transform: scale(1);
                }
            }

            i{
                margin-right: 5px;
            }

            .completed{
                text-decoration: line-through;
                opacity: 0.6;
            }

            select{
             border:none;
             border-radius:10px;
             padding:10px;
             background:white;
             border:1px solid #d1d5db;
             }

             .top-bar{
             display:flex;
             justify-content:flex-end;
             margin-bottom:20px;
            }

            ::-webkit-scrollbar{
              width:8px;
            }

            ::-webkit-scrollbar-thumb{
             background:#cbd5e1;
             border-radius:10px;
            }

            ul{
             padding:0;
            }

@media (max-width:768px){

   body{
      padding:20px;
      align-items:flex-start;
   }

   .container{
      width:100%;
      padding:24px 18px;
      margin-top:20px;
   }

   h1{
      font-size:26px;
   }

   .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
   }

   .actions button{
      justify-content:center;
      margin-bottom:0;
   }

   .input-group{
      gap:10px;
   }

   .task-controls{
      display:flex;
      flex-direction:column;
      gap:10px;
   }

   .task-controls input,
   .task-controls select,
   .task-controls button{
      width:100%;
   }

   li{
      flex-direction:column;
      align-items:flex-start;
      gap:14px;
   }

   li div{
      width:100%;
      display:flex;
      justify-content:flex-end;
   }
}
   
   


        </style>

        <title>To-Do App</title>
    </head>

    <body>

        <div class="container">
        <div class="top-bar">
         <button id="modeBtn" onclick="toggleMode()">🌙 Dark Mode</button>
        </div>

        <div class="actions">
         <button onclick="filterTasks('all')">
           <i class="fas fa-list"></i> All
         </button>

         <button onclick="filterTasks('completed')">
          <i class="fas fa-check-circle"></i> Completed
         </button>

         <button onclick="filterTasks('pending')">
          <i class="fas fa-clock"></i> Pending
         </button>

         <button onclick="clearAll()">
          <i class="fas fa-trash"></i> Clear
         </button>
        </div>

        <h1>To-Do App</h1>
        <p class="subtitle">Manage your daily tasks efficiently</p>

        <div id="taskStats" style="margin-bottom:10px; font-size: 14px;">
            Total:0 | Completed: 0 | Pending: 0
        </div>



        <div class="input-group">
<input type="text" id="searchInput" placeholder="Search Task...">

<input type="text" id="taskInput" placeholder="Enter Task">

</div>

<div class="task-controls">
 <input type="date" id="taskDate" style="flex:1">
 <button onclick="addTask()">
    <i class="fas fa-plus"></i>Add
 </button>

 <select id="priority">
    <option value="low">🟢 Low</option>
    <option value="medium">⚡ Medium</option>
    <option value="high">🔥 High</option>
 </select>

</div>


<ul id="taskList"></ul>

</div>

<script>

    let tasks = 
    JSON.parse(localStorage.getItem("tasks")) || [];

  function showTasks(){
    let list = document.getElementById("taskList");
    list.innerHTML = "";

    if(tasks.length === 0){
   list.innerHTML = `
   <p style="color:#9ca3af; margin-top:20px;">
      No tasks added yet
   </p>
   `;
   return;
  }

    tasks.forEach((task, index)=>{
        let li = document.createElement("li");
        li.setAttribute("draggable", true);

        let today = new Date().toISOString().split("T")[0];
        let isOverdue = task.date && task.date < today;

        if(isOverdue){
            li.style.background = "#fef2f2";
            li.style.borderLeft = "5px solid #ef4444"
        }

        if(task.priority === "high"){
            li.style.borderLeft = "5px solid red";
        }
        else if(task.priority === "medium"){
            li.style.borderLeft = "5px solid orange";
        }
        else{
            li.style.borderLeft = "5px solid green";
        }

        li.innerHTML = `
        <span onclick="toggleTask(${index})" class="${task.done ? 'completed' : ''}">
        ${task.text} <br>
        <small>${task.date || ""}</small>
        <br>
        <b>${task.priority}</b>
        </span>

        <div>
        <button onclick="editTask(${index})"><i class="fas fa-pen"></i></button>
        <button onclick="deleteTask(${index})"><i class="fas fa-trash"></i></button>
        </div>
        `;

        li.addEventListener("dragstart", () => {
           li.classList.add("dragging");
        });

        li.addEventListener("dragend", () => {
           li.classList.remove("dragging");
       updateOrder();
       });

        list.appendChild(li);
    });

    updateStats();
}  


function searchTask(){
    let search = document.getElementById("searchInput").value.toLowerCase();

    let listItems = document.querySelectorAll("#taskList li");

    listItems.forEach(li => {
        let text = li.innerText.toLowerCase();

        if(text.includes(search)){
            li.style.display = "flex";
        } else {
            li.style.display = "none";
        }
    });

    document.getElementById("searchInput")
.addEventListener("input", searchTask);
}

function editTask(index){
    let newTask = prompt("Edit Your Task:", tasks[index].text);

    if(newTask !== null && newTask.trim() !== ""){
        tasks[index].text = newTask;
        updateStorage();
    }
}



function addTask(){
    let input = document.getElementById("taskInput");
    let date =  document.getElementById("taskDate").value;

    let priority = document.getElementById("priority").value;

    if(input.value === ""){
        alert("Enter task");
        return;
    }

    tasks.push({text: input.value,
         done: false,
        date: date,
        priority: priority,
    });

    input.value = "";
    document.getElementById("taskDate").value = "";

    updateStorage();
}


function deleteTask(index){
    tasks.splice(index,1);
    updateStorage();
}

function toggleTask(index){
    tasks[index].done = !tasks[index].done;
    updateStorage();
}
showTasks();

function updateStorage(){
    localStorage.setItem("tasks", JSON.stringify(tasks));
    showTasks();
}

document.getElementById("taskInput").addEventListener("keypress", function(e){
if(e.key === "Enter"){
    addTask();
}
});

function toggleMode(){
    document.body.classList.toggle("dark");

    let btn = document.getElementById("modeBtn");

    if(document.body.classList.contains("dark"))
{
    btn.innerHTML = "Light Mode ☀️";
} else {
    btn.innerHTML = "Dark Mode 🌙";
}
    
}

function filterTasks(type){
    let listItems = document.querySelectorAll("#taskList li");

    listItems.forEach((li, index) => {
        if(type === "all"){
            li.style.display = "flex";
        }
        else if(type === "completed"){
            if(tasks[index].done){
                li.style.display = "flex";
            } else {
                li.style.display = "none";
            }
        }
        else if(type === "pending"){
            if(!tasks[index].done){
                li.style.display = "flex";
            } else {
                li.style.display = "none";
            }
        }
    });
}

function updateStats(){
    let total = tasks.length;
    let completed = tasks.filter(task => task.done).length;
    let pending = total - completed;

    document.getElementById("taskStats").innerHTML = 
    `Total: ${total} | Completed: ${completed} | Pending: ${pending}`;
}

function getDragAfterElement(container, y) {
    const draggableElements = [...container.querySelectorAll("li:not(.dragging)")];

    return draggableElements.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;

        if (offset < 0 && offset > closest.offset) {
            return { offset: offset, element: child };
        } else {
            return closest;
        }
    }, { offset: Number.NEGATIVE_INFINITY }).element;
}

const list = document.getElementById("taskList");

list.addEventListener("dragover", (e) => {
    e.preventDefault();

    const afterElement = getDragAfterElement(list, e.clientY);
    const dragging = document.querySelector(".dragging");

    if (afterElement == null) {
        list.appendChild(dragging);
     } else {
        list.insertBefore(dragging,afterElement);
     }
});

function updateOrder() {
    let newTask = [];
    let listItems = document.querySelectorAll("#taskList li");

    listItems.forEach(li =>{
        let text = li.querySelector("span").innerText.split("\n")[0];

        let foundTask = tasks.find(task => task.text === text);
        if(foundTask){
            newTask.push(foundTask);
        }
    });
    tasks = newTask;
    updateStorage();
}

function clearAll(){
    if(confirm("Are You Sure?")){
        tasks = [];
        updateStorage();
    }
}

</script>
    </body>
</html>
